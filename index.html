<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PawPeace — 陪伴毛孩走過最溫柔的旅程</title>
  <meta name="description" content="PawPeace 寵物安寧照護 App，陪伴飼主與毛孩走過生命最後一段旅程。QoL 追蹤、用藥管理、AI 血檢分析、照護日記。">
  <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: #FFF8F0;
      color: #3a3a3a;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 80px 24px 60px;
      max-width: 640px;
      margin: 0 auto;
    }

    .app-icon {
      width: 120px;
      height: 120px;
      border-radius: 28px;
      background: linear-gradient(145deg, #E8A87C, #C97B84);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      margin: 0 auto 28px;
      box-shadow: 0 8px 32px rgba(232, 168, 124, 0.3);
    }

    .hero h1 {
      font-size: 40px;
      font-weight: 700;
      color: #3a3a3a;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .hero .tagline {
      font-size: 20px;
      color: #85B79D;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .hero .subtitle {
      font-size: 16px;
      color: #999;
      max-width: 420px;
      margin: 0 auto;
    }

    /* Features */
    .features {
      max-width: 640px;
      margin: 0 auto;
      padding: 20px 24px 60px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .feature-card {
      background: #fff;
      border-radius: 16px;
      padding: 28px 24px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
      transition: transform 0.2s ease;
    }

    .feature-card:hover {
      transform: translateY(-2px);
    }

    .feature-icon {
      font-size: 36px;
      margin-bottom: 12px;
    }

    .feature-card h3 {
      font-size: 16px;
      font-weight: 600;
      color: #3a3a3a;
      margin-bottom: 6px;
    }

    .feature-card p {
      font-size: 14px;
      color: #888;
      line-height: 1.5;
    }

    /* CTA */
    .cta {
      text-align: center;
      padding: 0 24px 60px;
    }

    .app-store-badge {
      display: inline-block;
      transition: opacity 0.2s ease;
    }

    .app-store-badge:hover {
      opacity: 0.85;
    }

    .app-store-badge img {
      height: 54px;
    }

    .cta-hint {
      font-size: 13px;
      color: #bbb;
      margin-top: 12px;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 32px 24px;
      border-top: 1px solid #f0e8df;
    }

    footer a {
      color: #E8A87C;
      text-decoration: none;
      font-size: 14px;
    }

    footer a:hover {
      text-decoration: underline;
    }

    footer .divider {
      color: #ddd;
      margin: 0 12px;
    }

    footer .copyright {
      font-size: 12px;
      color: #bbb;
      margin-top: 12px;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .hero {
        padding: 56px 20px 40px;
      }

      .hero h1 {
        font-size: 32px;
      }

      .hero .tagline {
        font-size: 18px;
      }

      .features {
        grid-template-columns: 1fr;
        gap: 16px;
        padding: 10px 20px 48px;
      }

      .app-icon {
        width: 96px;
        height: 96px;
        font-size: 44px;
        border-radius: 22px;
      }
    }
  </style>
</head>
<body>

  <!-- Hero -->
  <section class="hero">
    <div class="app-icon">🐾</div>
    <h1>PawPeace</h1>
    <p class="tagline">陪伴毛孩走過最溫柔的旅程</p>
    <p class="subtitle">專為寵物安寧照護設計的溫暖紀錄工具</p>
  </section>

  <!-- Features -->
  <section class="features">
    <div class="feature-card">
      <div class="feature-icon">📊</div>
      <h3>生活品質追蹤</h3>
      <p>每日記錄毛孩狀態，用溫柔的方式關注變化趨勢</p>
    </div>
    <div class="feature-card">
      <div class="feature-icon">💊</div>
      <h3>用藥管理</h3>
      <p>藥物排程與提醒，不再錯過每一次給藥時間</p>
    </div>
    <div class="feature-card">
      <div class="feature-icon">🔬</div>
      <h3>AI 血檢分析</h3>
      <p>拍照上傳報告，AI 幫你解讀指數變化</p>
    </div>
    <div class="feature-card">
      <div class="feature-icon">📝</div>
      <h3>照護日記</h3>
      <p>用文字和照片留下與毛孩相處的珍貴回憶</p>
    </div>
  </section>

  <!-- CTA -->
  <section class="cta">
    <a class="app-store-badge" href="https://apps.apple.com/app/id6759600902" target="_blank" rel="noopener">
      <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store">
    </a>
    <p class="cta-hint">支援 iOS 16.0 以上</p>
  </section>

  <!-- Footer -->
  <footer>
    <div>
      <a href="privacy-policy.html">隱私權政策</a>
      <span class="divider">|</span>
      <a href="mailto:support@pawpeace.app">聯絡我們</a>
    </div>
    <p class="copyright">&copy; 2026 PawPeace. All rights reserved.</p>
  </footer>

</body>
</html>
